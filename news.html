<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator News - Life Transformers Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.8;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }

        .news-sources {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .source-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .source-btn:hover, .source-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        #news-feed {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .news-date {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .news-source {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .news-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .news-card p {
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .read-more {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .read-more:hover {
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 3rem;
        }

        .error {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Life Transformers Hub</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="blog.html">Blog</a>
            <a href="news.html">News</a>
            <a href="music.html">Music</a>
            <a href="wellness.html">Wellness</a>
            <a href="youtube.html">YouTube</a>
            <a href="tiktok.html">TikTok</a>
            <a href="pro.html">Go Pro</a>
        </nav>
    </div> <div class="container">
        <h1>Creator News & Updates</h1>
        <p class="subtitle">Live updates from top TikTok and social media creator news sources</p>

        <div class="news-sources">
            <button class="source-btn active" onclick="loadFeed('techcrunch')">TechCrunch</button>
            <button class="source-btn" onclick="loadFeed('socialmedia')">Social Media Today</button>
            <button class="source-btn" onclick="loadFeed('tubefilter')">Tubefilter</button>
        </div>

        <div id="news-feed">
            <div class="loading">Loading latest creator news...</div>
        </div>
    </div>

    <script>
        const RSS_FEEDS = {
            techcrunch: 'https://techcrunch.com/tag/tiktok/feed/',
            socialmedia: 'https://www.socialmediatoday.com/rss',
            tubefilter: 'https://www.tubefilter.com/feed/'
        };

        async function loadFeed(source) {
            const feedContainer = document.getElementById('news-feed');
            feedContainer.innerHTML = '<div class="loading">Loading latest news...</div>';
            
            // Update active button
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            try {
                const rssUrl = RSS_FEEDS[source];
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=9`);
                const data = await response.json();

                if (data.status === 'ok') {
                    displayNews(data.items);
                } else {
                    throw new Error('Failed to load news');
                }
            } catch (error) {
                feedContainer.innerHTML = `
                    <div class="error">
                        <h3>Unable to load news feed</h3>
                        <p>Please try refreshing the page or selecting a different source.</p>
                    </div>
                `;
            }
        }

        function displayNews(items) {
            const feedContainer = document.getElementById('news-feed');
            
            if (items.length === 0) {
                feedContainer.innerHTML = '<div class="error">No news articles found.</div>';
                return;
            }

            feedContainer.innerHTML = items.map(item => {
                const date = new Date(item.pubDate).toLocaleDateString('en-GB', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                const description = item.description
                    .replace(/<[^>]*>/g, '') // Strip HTML tags
                    .substring(0, 200) + '...';

                return `
                    <div class="news-card">
                        <div class="news-date">${date}</div>
                        <span class="news-source">${item.author || 'Creator News'}</span>
                        <h3>${item.title}</h3>
                        <p>${description}</p>
                        <a href="${item.link}" target="_blank" class="read-more">Read Full Article →</a>
                    </div>
                `;
            }).join('');
        }

        // Load TechCrunch feed by default on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadFeed('techcrunch');
        });
    </script>
</body>
</html>
