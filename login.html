<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Life Transformers Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo { font-size: 2.5rem; margin-bottom: 10px; }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 25px; }
        .login-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        input:focus { border-color: #667eea; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .forgot-link {
            display: block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover { text-decoration: underline; }
        .divider {
            margin: 25px 0;
            color: #999;
            font-size: 0.9rem;
        }
        .signup-box {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            padding: 20px;
            border-radius: 12px;
        }
        .signup-box p { margin-bottom: 15px; color: #333; }
        .signup-btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        .signup-btn:hover { background: #667eea; color: white; }
        .home-link {
            margin-top: 25px;
            display: inline-block;
            color: #667eea;
            text-decoration: none;
        }
    </style>
    <script data-memberstack-app="app_cmg8qzm4e004c0tmi91sjhpzn" src="https://static.memberstack.com/scripts/v1/memberstack.js" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>Welcome Back</h1>
        <p>Log in to access your dashboard and tools.</p>
        
        <div class="login-form">
            <form data-ms-form="login">
                <input type="email" data-ms-member="email" placeholder="Email address" required>
                <input type="password" data-ms-member="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <a href="forgot-password.html" class="forgot-link">🔐 Forgot your password?</a>
        </div>

        <div class="divider">— Don't have an account? —</div>

        <div class="signup-box">
            <p>Join Life Transformers Hub and unlock powerful creator tools!</p>
            <a href="pro.html" class="signup-btn">Sign Up Now</a>
        </div>

        <a href="index.html" class="home-link">← Back to Home</a>
    </div>
</body>
</html>
