<script>
        const SITE_CONFIG = {
            primary: 'https://delifetransformer.com',
            backup: 'https://splight333.github.io/Life-transformers-hub'
        };
        
        const AI_CONFIG = {
            groq: {
                apiKey: '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',
                baseUrl: 'https://api.groq.com/openai/v1',
                model: 'llama-3.1-8b-instant'
            }
        };
        
        async function callGroqAI(prompt) {
            try {
                const response = await fetch(AI_CONFIG.groq.baseUrl + '/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AI_CONFIG.groq.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: AI_CONFIG.groq.model,
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 500,
                        temperature: 0.8
                    })
                });
                
                if (!response.ok) {
                    throw new Error('API request failed: ' + response.status);
                }
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('AI Error:', error);
                return 'Error generating content: ' + error.message;
            }
        }
        
        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
        }
        
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
        }
        
        function login(e) { 
            e.preventDefault(); 
            closeModal('loginModal'); 
            alert('Welcome back!'); 
        }
        
        function signup(e) { 
            e.preventDefault(); 
            closeModal('signupModal'); 
            alert('Account created successfully!'); 
        }
        
        function openTool(tool) {
            const content = document.getElementById('toolContent');
            
            if (tool === 'calculator') {
                content.innerHTML = `
                    <h2>💎 Diamond Calculator</h2>
                    <div class="form-group">
                        <label>Number of Diamonds:</label>
                        <input type="number" id="diamonds" placeholder="Enter diamonds">
                    </div>
                    <button class="btn" onclick="calculate()">Calculate Value</button>
                    <div id="result" style="margin-top: 20px;"></div>
                `;
            } else if (tool === 'hooks') {
                content.innerHTML = `
                    <h2>🤖 AI Hook Generator</h2>
                    <div class="form-group">
                        <label>Content Topic:</label>
                        <input type="text" id="hookTopic" placeholder="e.g., fitness motivation, morning routine">
                    </div>
                    <button class="btn" onclick="generateHooks()">Generate Viral Hooks</button>
                    <div id="hooksResult" style="margin-top: 20px;"></div>
                `;
            } else if (tool === 'script') {
                content.innerHTML = `
                    <h2>📝 AI Script Generator</h2>
                    <div class="form-group">
                        <label>Video Topic:</label>
                        <input type="text" id="scriptTopic" placeholder="e.g., daily productivity tips">
                    </div>
                    <div class="form-group">
                        <label>Video Length:</label>
                        <select id="scriptLength">
                            <option value="30 seconds">30 seconds</option>
                            <option value="60 seconds">60 seconds</option>
                            <option value="90 seconds">90 seconds</option>
                        </select>
                    </div>
                    <button class="btn" onclick="generateScript()">Generate Script</button>
                    <div id="scriptResult" style="margin-top: 20px;"></div>
                `;
            }
            
            openModal('toolModal');
        }
        
        function calculate() {
            const diamonds = document.getElementById('diamonds').value;
            if (!diamonds || diamonds <= 0) {
                alert('Please enter a valid number of diamonds');
                return;
            }
            const gbp = (diamonds * 0.004).toFixed(2);
            const usd = (diamonds * 0.005).toFixed(2);
            const eur = (diamonds * 0.0045).toFixed(2);
            
            document.getElementById('result').innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px;">
                    <h3 style="color: #fbbf24; margin-bottom: 10px;">Your Earnings:</h3>
                    <p>💷 GBP: £${gbp}</p>
                    <p>💵 USD: $${usd}</p>
                    <p>💶 EUR: €${eur}</p>
                </div>
            `;
        }
        
        async function generateHooks() {
            const topic = document.getElementById('hookTopic').value;
            if (!topic) {
                alert('Please enter a topic');
                return;
            }
            
            const result = document.getElementById('hooksResult');
            result.innerHTML = '<p style="color: #fbbf24;">🤖 AI is generating your viral hooks...</p>';
            
            const prompt = `Generate 5 viral TikTok hooks about "${topic}". Make them attention-grabbing within 3 seconds. Each hook should be punchy and make people stop scrolling. Number them 1-5.`;
            
            const hooks = await callGroqAI(prompt);
            result.innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; white-space: pre-wrap;">
                    <h3 style="color: #10b981; margin-bottom: 15px;">✨ Your Viral Hooks:</h3>
                    ${hooks.replace(/\n/g, '<br>')}
                </div>
            `;
        }
        
        async function generateScript() {
            const topic = document.getElementById('scriptTopic').value;
            const length = document.getElementById('scriptLength').value;
            
            if (!topic) {
                alert('Please enter a topic');
                return;
            }
            
            const result = document.getElementById('scriptResult');
            result.innerHTML = '<p style="color: #fbbf24;">🤖 AI is writing your script...</p>';
            
            const prompt = `Create a complete TikTok video script about "${topic}" that is ${length} long. Include:
            1. Hook (first 3 seconds)
            2. Main content
            3. Transitions
            4. Call-to-action
            Format it clearly with sections labeled.`;
            
            const script = await callGroqAI(prompt);
            result.innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; white-space: pre-wrap;">
                    <h3 style="color: #10b981; margin-bottom: 15px;">📜 Your Video Script:</h3>
                    ${script.replace(/\n/g, '<br>')}
                </div>
                <button class="btn" onclick="copyScript()" style="margin-top: 15px;">📋 Copy Script</button>
            `;
        }
        
        function copyScript() {
            const scriptText = document.querySelector('#scriptResult div').innerText;
            navigator.clipboard.writeText(scriptText).then(() => {
                alert('Script copied to clipboard!');
            });
        }
    </script>
