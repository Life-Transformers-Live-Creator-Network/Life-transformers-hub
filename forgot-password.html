<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Life Transformers Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 20px; line-height: 1.5; }
        .section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
        }
        .section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .step-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            line-height: 28px;
            text-align: center;
            font-weight: 600;
            margin-right: 10px;
        }
        .error-message {
            color: #dc2626;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        .success-message {
            color: #10b981;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
    <script data-memberstack-app="app_cmg8qzm4e004c0tmi91sjhpzn" src="https://static.memberstack.com/scripts/v1/memberstack.js" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1>Reset Password</h1>
        
        <!-- Step 1: Request Reset Code -->
        <div class="section" id="step1">
            <h3><span class="step-number">1</span>Request Reset Code</h3>
            <p style="font-size: 0.9rem; margin-bottom: 15px;">Enter your email to receive a 6-digit code.</p>
            <form id="forgot-password-form">
                <input type="email" id="email-input" placeholder="Enter your email" required>
                <button type="submit" id="send-code-btn">Send Code</button>
            </form>
            <p class="error-message" id="step1-error"></p>
            <p class="success-message" id="step1-success"></p>
        </div>

        <!-- Step 2: Enter Code & New Password -->
        <div class="section" id="step2">
            <h3><span class="step-number">2</span>Enter Code & New Password</h3>
            <p style="font-size: 0.9rem; margin-bottom: 15px;">Check your email for the code, then set a new password.</p>
            <form data-ms-form="reset-password">
                <input type="text" data-ms-member="token" placeholder="6-digit code from email" required maxlength="6">
                <input type="password" data-ms-member="password" placeholder="New password (min 8 characters)" required minlength="8">
                <button type="submit">Reset Password</button>
            </form>
            <p class="error-message" data-ms-message="error"></p>
            <p class="success-message" data-ms-message="success"></p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const memberstack = window.$memberstackDom;
        const emailForm = document.getElementById('forgot-password-form');
        const emailInput = document.getElementById('email-input');
        const sendCodeBtn = document.getElementById('send-code-btn');
        const errorMsg = document.getElementById('step1-error');
        const successMsg = document.getElementById('step1-success');

        emailForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Disable button while processing
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = 'Sending...';
            
            try {
                await memberstack.sendMemberResetPasswordEmail({
                    email: emailInput.value
                });
                
                // Show success message
                successMsg.textContent = 'Code sent! Check your email.';
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';
                
                // Reset button
                sendCodeBtn.textContent = 'Code Sent ✓';
                
            } catch (error) {
                // Show error message
                errorMsg.textContent = error.message || 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                
                // Reset button
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = 'Send Code';
            }
        });
    });
    </script>
</body>
</html>
